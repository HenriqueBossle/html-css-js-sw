<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
    <header>
        <nav>
            <ul class="links">
                <li><a href="#">Home</a></li>
                <li><a href="#">Blog</a></li>   
                <div class="logo">  
                    <img width="100px" src="https://pngimg.com/d/star_wars_logo_PNG27.png" alt="">
                </div>
                <li><a href="#">Produtos</a></li>
                <li><a href="#">Sobre</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="news">
            <h1>Notícias</h1>
            <div class="carousel">
            <button onclick="preivous()"><i class="fa-solid fa-angle-left"></i></button>
            <div class="posts-news">
                <img id="carousel-img" width="1080px" src="https://r2-media.wdwnt.com/2025/12/star-wars-galactic-racer-reveal-3.jpg" alt="">
                <h2 id="carousel-title" class="news-title">Novo Jogo de Podracer</h2>
            </div>
            <button onclick="next()"><i class="fa-solid fa-angle-right"></i></button></div>
        </section>

        <section class="blog">
            <h1>Blog</h1>
            <div class="cards-session">
                <div class="cards">
                    <img width="400px" src="https://nerdizmo.ig.com.br/wp-content/uploads/2024/10/Star-Wars-Jedi-Knights-Capa.jpg" alt="">
                    <h3>Os Jedi mais poderosos</h3>
                    <button>Ver mais</button>
                </div>
                <div class="cards">
                    <img width="400px" src="https://i.redd.it/t5a7cb9gzrq41.jpg" alt="">
                    <h3>Poderes mais estranhos dos Sith</h3>
                    <button>Ver mais</button>
                </div>
                <div class="cards">
                    <img width="400px" src="https://i.redd.it/6m224bg7dksy.jpg" alt="">
                    <h3>Por que os Droides B1 são burros?</h3>
                    <button>Ver mais</button>
                </div>
            </div>
            
        </section>
    </main>
    <footer>
        <p>Feito por Henrique Bossle</p>
    </footer>

    <script>
        const lista_images = ["https://r2-media.wdwnt.com/2025/12/star-wars-galactic-racer-reveal-3.jpg"
            ,"https://lumiere-a.akamaihd.net/v1/images/maul-main_23403e98.jpeg?region=0%2C0%2C1920%2C1080",
                "https://images2.alphacoders.com/130/thumb-1920-1305488.png"]

        const lista_titulos = ["Novo Jogo de Podracer", "Animação do Darth Maul", "Filme The Mandalorian And Grogu"]

        let index = 0;

        const imgCarousel = document.getElementById("carousel-img");
        const titleCarousel = document.getElementById("carousel-title");

        imgCarousel.src = lista_images[index];
        titleCarousel.innerText = lista_titulos[index];

        function next(){
            if(index < lista_images.length - 1){
                index = index + 1;
                imgCarousel.src = lista_images[index];
                titleCarousel.innerText = lista_titulos[index];




            }else{
                index = 0;
                imgCarousel.src = lista_images[0]
                titleCarousel.innerText = lista_titulos[0];

            }
        }

        function preivous() {
            if(index == 0){
                index = lista_images.length -1 ;
                imgCarousel.src = lista_images[index]
                titleCarousel.innerText = lista_titulos[index];


            }else{
                index = index -1;
                imgCarousel.src = lista_images[index]
                titleCarousel.innerText = lista_titulos[index];


            }
        }

    </script>

</body>
</html>
